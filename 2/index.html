<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLAMES — Relationship Oracle</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── Ambient canvas particles ── -->
  <canvas id="bg-canvas"></canvas>

  <!-- ── Floating decorative orbs ── -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- ── Main app wrapper ── -->
  <main class="app">

    <!-- Header -->
    <header class="header">
      <div class="logo-mark">🔮</div>
      <h1 class="headline">FLAMES</h1>
      <p class="sub">The Relationship Oracle</p>
    </header>

    <!-- Input card -->
    <section class="glass-card input-card" id="input-section">

      <div class="field-group">
        <label class="field-label" for="name1">Your Name</label>
        <div class="input-wrap">
          <span class="input-icon">✦</span>
          <input
            type="text"
            id="name1"
            class="name-input"
            placeholder="Enter your name…"
            autocomplete="off"
            maxlength="40"
          />
        </div>
      </div>

      <div class="vs-divider">
        <span class="vs-line"></span>
        <span class="vs-text">vs</span>
        <span class="vs-line"></span>
      </div>

      <div class="field-group">
        <label class="field-label" for="name2">Their Name</label>
        <div class="input-wrap">
          <span class="input-icon">✦</span>
          <input
            type="text"
            id="name2"
            class="name-input"
            placeholder="Enter their name…"
            autocomplete="off"
            maxlength="40"
          />
        </div>
      </div>

      <p class="error-msg" id="error-msg" aria-live="polite"></p>

      <button class="calc-btn" id="calc-btn">
        <span class="btn-text">Calculate FLAMES</span>
        <span class="btn-shimmer"></span>
      </button>
    </section>

    <!-- FLAMES wheel + loading overlay -->
    <section class="wheel-section hidden" id="wheel-section">
      <div class="wheel-container">
        <div class="wheel-ring"></div>
        <div class="wheel-face" id="wheel-face">
          <span class="wheel-letter" data-l="F">F</span>
          <span class="wheel-letter" data-l="L">L</span>
          <span class="wheel-letter" data-l="A">A</span>
          <span class="wheel-letter" data-l="M">M</span>
          <span class="wheel-letter" data-l="E">E</span>
          <span class="wheel-letter" data-l="S">S</span>
        </div>
        <div class="wheel-pointer"></div>
      </div>
      <p class="loading-label" id="loading-label">Reading the stars…</p>
    </section>

    <!-- Result card -->
    <section class="glass-card result-card hidden" id="result-section">
      <div class="result-emoji" id="result-emoji"></div>
      <h2 class="result-title" id="result-title"></h2>
      <p class="result-desc" id="result-desc"></p>

      <div class="names-display">
        <span id="disp-name1" class="dname"></span>
        <span class="dname-sep">💫</span>
        <span id="disp-name2" class="dname"></span>
      </div>

      <div class="result-actions">
        <button class="action-btn copy-btn" id="copy-btn" title="Copy result">
          <span>📋</span> Copy
        </button>
        <button class="action-btn share-btn" id="share-btn" title="Share">
          <span>🔗</span> Share
        </button>
        <button class="action-btn reset-btn" id="reset-btn" title="Try again">
          <span>🔄</span> Try Again
        </button>
      </div>
    </section>

    <!-- FLAMES legend -->
    <ul class="flames-legend" id="flames-legend">
      <li data-l="F"><span class="leg-icon">🤝</span><span>Friends</span></li>
      <li data-l="L"><span class="leg-icon">❤️</span><span>Love</span></li>
      <li data-l="A"><span class="leg-icon">🥰</span><span>Affection</span></li>
      <li data-l="M"><span class="leg-icon">💍</span><span>Marriage</span></li>
      <li data-l="E"><span class="leg-icon">😈</span><span>Enemies</span></li>
      <li data-l="S"><span class="leg-icon">👨‍👩‍👧‍👦</span><span>Siblings</span></li>
    </ul>

  </main>

  <!-- Confetti container -->
  <div id="confetti-container" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
